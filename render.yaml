services:
  - type: web
    name: interviewai-free-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: interviewai-free-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false

databases:
  - name: interviewai-free-db
    plan: free
